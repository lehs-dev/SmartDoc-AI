{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-3">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-clock-history"></i> Lịch sử Chat</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-outline-primary w-100 mb-3"><i class="bi bi-plus-circle"></i> Cuộc hội thoại
                    mới</button>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item text-muted">Chưa có lịch sử nào.</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="col-md-9">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show shadow-sm"
            role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-cloud-arrow-up"></i> Tải tài liệu lên (PDF/DOCX)</h5>
                <form action="" method="post" enctype="multipart/form-data"
                    class="d-flex align-items-center gap-3 mt-3">
                    {% csrf_token %}
                    <input class="form-control" type="file" name="document" accept=".pdf,.docx" required>
                    <button type="submit" class="btn btn-success"><i class="bi bi-upload"></i> Tải lên & Xử lý</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body" id="chat-window" style="height: 55vh; overflow-y: auto;">
                <div class="text-center text-muted mt-5" id="empty-chat-msg">
                    <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                    <p>Hãy tải tài liệu lên và bắt đầu đặt câu hỏi cho Gemma 4!</p>
                </div>
            </div>
            <div class="card-footer">
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Nhập câu hỏi của bạn...">
                    <button class="btn btn-primary" id="send-btn" type="button"><i class="bi bi-send"></i> Gửi</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const chatWindow = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const emptyMsg = document.getElementById('empty-chat-msg');

        // Lấy CSRF token từ form upload ở trên (Django bảo mật cần cái này)
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        // Hàm tạo bong bóng chat
        function appendMessage(sender, text) {
            if (emptyMsg) emptyMsg.style.display = 'none'; // Ẩn lời chào

            const msgDiv = document.createElement('div');
            msgDiv.className = `mb-3 ${sender === 'user' ? 'text-end' : 'text-start'}`;

            const isUser = sender === 'user';
            msgDiv.innerHTML = `
            <span class="badge ${isUser ? 'bg-primary' : 'bg-success'} mb-1">
                ${isUser ? '<i class="bi bi-person"></i> Bạn' : '<i class="bi bi-robot"></i> Gemma 4'}
            </span>
            <div class="p-3 rounded-3 shadow-sm ${isUser ? 'bg-light border' : 'bg-success text-white'}" style="display: inline-block; max-width: 85%; text-align: left; white-space: pre-wrap;">
                ${text}
            </div>
        `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Tự cuộn xuống cuối
        }

        // Hàm gửi tin nhắn
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. Khóa input và hiện tin nhắn của mình
            chatInput.value = '';
            sendBtn.disabled = true;
            appendMessage('user', text);

            // 2. Hiện trạng thái Gemma đang gõ
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'text-start mb-3 text-muted';
            typingDiv.innerHTML = '<em><i class="bi bi-robot"></i> Gemma đang đọc tài liệu và suy nghĩ...</em>';
            chatWindow.appendChild(typingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // 3. Gửi lên cổng API vừa tạo ở Bước 1
                const response = await fetch('/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();

                // Xóa dòng "đang gõ"
                document.getElementById(typingId).remove();

                // 4. In câu trả lời của Gemma ra màn hình
                if (response.ok) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', '❌ Lỗi: ' + data.error);
                }
            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage('bot', '❌ Mất kết nối đến server. Hãy kiểm tra lại.');
            }

            sendBtn.disabled = false;
            chatInput.focus();
        }

        // Bắt sự kiện click chuột hoặc ấn phím Enter
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    });
</script>
{% endblock %}
